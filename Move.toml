[package]
name = "brownfi_amm"
edition = "2024.beta" # edition = "legacy" to use legacy (pre-2024) Move
version = "2.0.0"

[dependencies]
brownfi_oracle = { local = "./packages/oracle" }

[dependencies.Pyth]
local = "./packages/pyth-crosschain/target_chains/sui/contracts"

[dependencies.flowx_clmm]
git = "https://github.com/FlowX-Finance/clmm-contracts.git"
rev = "95441b22ca9d5d7420a6e527afcfc1a2639fcc39"

[dependencies.Switchboard]
git = "https://github.com/switchboard-xyz/sui.git"
subdir = "on_demand/"
rev = "mainnet"

[dependencies.stork]
local = "./packages/stork-sui"

[dependencies.SupraOracle]
local = "./packages/supra-sui"

